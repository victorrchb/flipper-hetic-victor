name: CD

on:
  push:
    branches: [ "main" ]

jobs:
  validate-all:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: server
            command: "node --check src/index.js"
          - dir: playfield
            command: "npm run build"
          - dir: backglass
            command: "npm run build"
          - dir: dmd
            command: "npm run build"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: npm install

      - name: Run checks / build
        working-directory: ${{ matrix.dir }}
        run: ${{ matrix.command }}

  upload-front-artifacts:
    needs: validate-all
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: playfield
            dist: dist
          - dir: backglass
            dist: dist
          - dir: dmd
            dist: dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: npm install

      - name: Build
        working-directory: ${{ matrix.dir }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.dir }}-dist
          path: ${{ matrix.dir }}/${{ matrix.dist }}