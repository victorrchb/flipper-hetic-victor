name: CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: playfield
            dist: dist
          - dir: backglass
            dist: dist
          - dir: dmd
            dist: dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.dir }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.dir }}-dist
          path: ${{ matrix.dir }}/${{ matrix.dist }}

